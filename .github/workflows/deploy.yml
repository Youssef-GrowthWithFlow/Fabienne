# develop → preprod, main → prod (via SSH to the Hostinger VPS).
name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        type: choice
        options: [preprod, prod]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'preprod' }}
    env:
      TARGET: ${{ github.event.inputs.target || (github.ref == 'refs/heads/main' && 'prod' || 'preprod') }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync repo to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/dist' \
            --exclude 'backend/.venv' \
            --exclude 'backend/data' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/fabienne/${TARGET}/

      - name: Build and restart stack
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -se <<EOF
            set -euo pipefail
            cd /opt/fabienne/${TARGET}
            if [ ! -f .env ]; then
              echo "Missing /opt/fabienne/${TARGET}/.env on the VPS — aborting." >&2
              exit 1
            fi
            if [ "${TARGET}" = "prod" ]; then
              export COMPOSE_PROJECT_NAME=fabienne-prod
              export FABIENNE_HOST=fabienne.growthwithflow.com
              export FABIENNE_ROUTER=fabienne-prod
            else
              export COMPOSE_PROJECT_NAME=fabienne-preprod
              export FABIENNE_HOST=fabienne-preprod.growthwithflow.com
              export FABIENNE_ROUTER=fabienne-preprod
            fi
            docker compose -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
          EOF

      - name: Smoke test
        run: |
          if [ "${TARGET}" = "prod" ]; then
            HOST=fabienne.growthwithflow.com
          else
            HOST=fabienne-preprod.growthwithflow.com
          fi
          for i in 1 2 3 4 5 6; do
            sleep 10
            code=$(curl -sk -o /dev/null -w "%{http_code}" "https://${HOST}/" || true)
            echo "Attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
          done
          echo "Smoke test failed for $HOST" >&2
          exit 1
